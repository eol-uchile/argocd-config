---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: redfid-backup-daily
spec:
  schedule: 0 10 * * *
  concurrencyPolicy: Forbid
  failedJobsHistoryLimit: 2
  successfulJobsHistoryLimit: 2
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: edx-backup
        spec:
          initContainers:
            - name: cleanup-pvc
              image: busybox:1.36
              command:
                - sh
                - -c
                - "rm -rf /host_mount/* /host_mount/.[!.]* 2>/dev/null && echo 'PVC cleanup done'"
              volumeMounts:
                - name: redfid-bkp
                  mountPath: /host_mount
          restartPolicy: OnFailure
          containers:
            - name: edx-backup
              image: old-backup-container
              args:
                - /root/scripts/backup.sh
                - daily
                - minio,mongodb_comments,mongodb,mysql
                - keep
              envFrom:
                - secretRef:
                    name: common-config
                - secretRef:
                    name: redfid-config
              resources:
                requests:
                  memory: 256Mi
                  cpu: 750m
                limits:
                  memory: 2Gi
                  cpu: 750m
              volumeMounts:
                - name: redfid-bkp
                  mountPath: /host_mount
          volumes:
            - name: redfid-bkp
              persistentVolumeClaim:
                claimName: redfid-bkp-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redfid-bkp-pvc
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn-single-replica
  resources:
    requests:
      storage: 14Gi
