---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: cla-backup-daily
spec:
  schedule: 0 5 * * *
  concurrencyPolicy: Forbid
  failedJobsHistoryLimit: 2
  successfulJobsHistoryLimit: 2
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: edx-backup
        spec:
          initContainers:
            - name: cleanup-pvc
              image: busybox:1.36
              command:
                - sh
                - -c
                - "rm -rf /host_mount/cla/* /host_mount/cla/.[!.]* 2>/dev/null && echo 'PVC cleanup done'"
              volumeMounts:
                - name: backup-storage
                  mountPath: /host_mount
          restartPolicy: OnFailure
          containers:
            - name: edx-backup
              image: old-backup-container
              args:
                - /root/scripts/backup.sh
                - daily
                - minio,mongodb_comments,mongodb,mysql
                - keep
              envFrom:
                - secretRef:
                    name: common-config
                - secretRef:
                    name: cla-config
              resources:
                requests:
                  memory: 256Mi
                  cpu: 750m
                limits:
                  memory: 2Gi
                  cpu: 750m
              volumeMounts:
                - name: backup-storage
                  mountPath: /host_mount
          volumes:
            - name: backup-storage
              persistentVolumeClaim:
                claimName: pvc-qnap-cla
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: pv-qnap-cla
spec:
  capacity:
    storage: 200Gi
  accessModes:
    - ReadWriteOnce
  claimRef:
    name: pvc-qnap-cla
    namespace: edx-backup
  nfs:
    server: 172.28.8.55
    path: /bkp_tmp
  persistentVolumeReclaimPolicy: Retain
  mountOptions:
    - nfsvers=4.1
    - hard
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pvc-qnap-cla
  namespace: edx-backup
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 200Gi
  volumeName: pv-qnap-cla
  storageClassName: ""
