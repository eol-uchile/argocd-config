---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: eol-backup-daily
spec:
  schedule: "30 0 * * *"
  concurrencyPolicy: Forbid
  failedJobsHistoryLimit: 2
  successfulJobsHistoryLimit: 2
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: edx-backup
        spec:
          initContainers:
            - name: cleanup-pvc
              image: busybox:1.36
              command:
                - sh
                - -c
                - "rm -rf /host_mount/eol/* /host_mount/eol/.[!.]* 2>/dev/null && echo 'PVC cleanup done'"
              volumeMounts:
                - name: backup-storage
                  mountPath: /host_mount
          restartPolicy: OnFailure
          containers:
            - name: eol-backup
              image: old-backup-container
              args:
                - /root/scripts/backup.sh
                - daily
                - minio,mongodb_comments,mongodb,mysql
                - keep
              envFrom:
                - secretRef:
                    name: common-config
                - secretRef:
                    name: eol-config
              resources:
                requests:
                  memory: 256Mi
                  cpu: 750m
                limits:
                  memory: 2Gi
                  cpu: 750m
              volumeMounts:
                - name: backup-storage
                  mountPath: /host_mount
          volumes:
            - name: backup-storage
              persistentVolumeClaim:
                claimName: pvc-qnap-eol
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: pv-qnap-eol
spec:
  capacity:
    storage: 300Gi
  accessModes:
    - ReadWriteOnce
  claimRef:
    name: pvc-qnap-eol
    namespace: edx-backup
  nfs:
    server: 172.28.8.55
    path: /bkp_tmp
  persistentVolumeReclaimPolicy: Retain
  mountOptions:
    - nfsvers=4.1
    - hard
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pvc-qnap-eol
  namespace: edx-backup
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 300Gi
  volumeName: pv-qnap-eol
  storageClassName: ""
