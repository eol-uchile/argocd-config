---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: moodle4-static
  name: moodle4-static
spec:
  replicas: 1
  selector:
    matchLabels:
      app: moodle4-static
  template:
    metadata:
      creationTimestamp: null
      labels:
        app: moodle4-static
    spec:
      nodeSelector:
        kubernetes.io/hostname: cloud-elearning01
      containers:
        - image: ghcr.io/eol-uchile/moodle-vlabx-docker:nginx-8566546abee0d0bf606a56104d02c30f87c839ae
          name: moodle-static
---
apiVersion: v1
kind: Service
