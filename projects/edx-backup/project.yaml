---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: edx-backup
  namespace: argocd
spec:
  description: Project to backup edx storages
  # Allow manifests to deploy from any Git repos
  sourceRepos:
    - '*'
  destinations:
    - namespace: edx-backup
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: ''
      kind: Namespace
    - group: ''
      kind: 'PersistentVolume'
  namespaceResourceWhitelist:
    - group: 'apps'
      kind: Deployment
    - group: 'bitnami.com'
      kind: SealedSecret
    - group: 'batch'
      kind: CronJob
    - group: ''
      kind: 'PersistentVolumeClaim'
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: edx-backup
  namespace: argocd
spec:
  destination:
    namespace: edx-backup
    server: 'https://kubernetes.default.svc'
  source:
    path: edx-backup
    repoURL: 'https://github.com/eol-uchile/argocd-config'
    targetRevision: main
  project: edx-backup
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
